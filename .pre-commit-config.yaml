repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --frozen --extra dev ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check --fix
        entry: uv run --frozen --extra dev ruff check --fix
        language: system
        types_or: [python, pyi]
