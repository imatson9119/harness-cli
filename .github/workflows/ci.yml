name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: "0.6.11"

      - name: Install project
        run: uv sync --locked --all-extras --dev

      - name: Format
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Type check
        run: uv run --frozen mypy src/harness_cli

      - name: Test
        run: uv run --frozen python -m unittest

      - name: Validate endpoint manifest
        run: uv run --frozen python scripts/validate_openapi_manifest.py

      - name: Compile
        run: uv run --frozen python -m compileall -q src tests scripts

      - name: Build package
        run: uv build --sdist --wheel

      - name: Smoke installed wheel
        run: |
          uv venv .package-smoke
          uv pip install --python .package-smoke/bin/python dist/*.whl
          .package-smoke/bin/hctl --version
          .package-smoke/bin/hctl api info
          .package-smoke/bin/hctl api list --search list-roles-acc --limit 1
          .package-smoke/bin/hctl config-api list-configs --help
          .package-smoke/bin/hctl version-api get-version --help
